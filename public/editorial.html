<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editorial — ContentBrain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- DOMPurify: sanitizes HTML before inserting into DOM -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1a2b4b;
    --green: #0f8a5f;
    --green-light: #e6f5f0;
    --amber: #f59e0b;
    --amber-light: #fef3c7;
    --red: #c0392b;
    --red-light: #fdecea;
    --cream: #faf8f4;
    --grey: #f0eeea;
    --border: #e2dfd8;
    --text: #1a2b4b;
    --muted: #6b7280;
    --font: 'IBM Plex Sans', Arial, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  body { font-family: var(--font); background: var(--cream); color: var(--text); min-height: 100vh; }

  header {
    background: var(--navy); color: white; padding: 0 2rem; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.02em; }
  header span { font-size: 0.8rem; opacity: 0.6; font-family: var(--mono); }

  main {
    max-width: 1400px; margin: 0 auto; padding: 2rem;
    display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
  }

  .panel { background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .panel-header {
    padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  }
  .panel-header h2 { font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--navy); }
  .panel-body { padding: 1.25rem; }

  .brand-filter { display: flex; gap: 0.5rem; }
  .brand-btn {
    font-family: var(--font); font-size: 0.75rem; font-weight: 500;
    padding: 0.25rem 0.75rem; border-radius: 999px; border: 1.5px solid var(--border);
    background: white; cursor: pointer; transition: all 0.15s;
  }
  .brand-btn:hover { border-color: var(--green); color: var(--green); }
  .brand-btn.active { background: var(--navy); color: white; border-color: var(--navy); }

  .coverage-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .tag-chip {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 0.8rem; font-weight: 500;
  }
  .tag-chip .count { font-family: var(--mono); font-size: 0.7rem; opacity: 0.7; }
  .tag-chip.covered { background: var(--green-light); color: #0d5c40; }
  .tag-chip.saturated { background: var(--amber-light); color: #92400e; }

  .draft-list { display: flex; flex-direction: column; gap: 0.75rem; max-height: 480px; overflow-y: auto; }
  .draft-card { border: 1px solid var(--border); border-radius: 6px; padding: 0.875rem 1rem; }
  .draft-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.5rem; }
  .draft-card-title { font-size: 0.9rem; font-weight: 600; line-height: 1.35; flex: 1; }
  .brand-chip {
    font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 0.15rem 0.5rem; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
  }
  .brand-chip.auctionbrain { background: #e8edf5; color: var(--navy); }
  .brand-chip.bridgematch { background: var(--green-light); color: #0d5c40; }
  .draft-meta { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; }
  .draft-summary { font-size: 0.8rem; color: var(--muted); line-height: 1.5; margin-bottom: 0.75rem; }
  .draft-actions { display: flex; gap: 0.5rem; align-items: center; }
  .draft-score {
    font-family: var(--mono); font-size: 0.75rem; padding: 0.2rem 0.5rem;
    border-radius: 4px; background: var(--grey); color: var(--muted); margin-left: auto;
  }
  .draft-score.pass { background: var(--green-light); color: #0d5c40; }
  .reject-form { margin-top: 0.5rem; display: none; }
  .reject-form textarea {
    width: 100%; font-family: var(--font); font-size: 0.8rem; padding: 0.5rem;
    border: 1px solid var(--border); border-radius: 4px; resize: vertical; min-height: 60px; margin-bottom: 0.4rem;
  }

  .btn {
    font-family: var(--font); font-size: 0.8rem; font-weight: 600;
    padding: 0.4rem 0.9rem; border-radius: 5px; border: none; cursor: pointer; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-green { background: var(--green); color: white; }
  .btn-red { background: var(--red); color: white; }
  .btn-outline { background: white; border: 1.5px solid var(--border); color: var(--text); }
  .btn-navy { background: var(--navy); color: white; }
  .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.75rem; }

  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; }
  .tab-btn {
    font-family: var(--font); font-size: 0.8rem; font-weight: 600;
    padding: 0.6rem 1rem; border: none; background: none; cursor: pointer;
    color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s;
  }
  .tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--navy); }
  .form-group select, .form-group textarea, .form-group input[type=text] {
    width: 100%; font-family: var(--font); font-size: 0.85rem;
    padding: 0.55rem 0.75rem; border: 1px solid var(--border);
    border-radius: 5px; background: white; color: var(--text); outline: none; transition: border-color 0.15s;
  }
  .form-group select:focus, .form-group textarea:focus, .form-group input:focus { border-color: var(--green); }
  .form-group textarea { resize: vertical; min-height: 120px; }

  .upload-zone {
    border: 2px dashed var(--border); border-radius: 8px; padding: 2rem;
    text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; margin-bottom: 1rem;
  }
  .upload-zone:hover, .upload-zone.dragging { border-color: var(--green); background: var(--green-light); }
  .upload-zone p { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; }
  #upload-input { display: none; }

  .extracted-preview {
    background: var(--grey); border-radius: 6px; padding: 1rem; font-size: 0.8rem;
    line-height: 1.6; max-height: 200px; overflow-y: auto; margin-bottom: 0.75rem;
    white-space: pre-wrap; font-family: var(--mono); display: none;
  }

  .brief-list { display: flex; flex-direction: column; gap: 0.6rem; max-height: 300px; overflow-y: auto; }
  .brief-card {
    border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem 1rem;
    display: flex; align-items: flex-start; gap: 0.75rem;
  }
  .brief-card-body { flex: 1; font-size: 0.82rem; line-height: 1.5; }
  .brief-card-meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.25rem; }

  #toast {
    position: fixed; bottom: 2rem; right: 2rem; background: var(--navy); color: white;
    padding: 0.75rem 1.25rem; border-radius: 6px; font-size: 0.85rem; font-weight: 500;
    opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; z-index: 1000;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { background: var(--red); }

  .empty { text-align: center; padding: 2rem 1rem; color: var(--muted); font-size: 0.85rem; }
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid var(--border); border-top-color: var(--green);
    border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 0.4rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <h1>ContentBrain — Editorial</h1>
  <span id="last-updated"></span>
</header>

<main>

  <!-- Panel A: Coverage -->
  <div class="panel">
    <div class="panel-header">
      <h2>Topic Coverage</h2>
      <div class="brand-filter">
        <button class="brand-btn active" onclick="setCoverageBrand('all', this)">All</button>
        <button class="brand-btn" onclick="setCoverageBrand('auctionbrain', this)">AuctionBrain</button>
        <button class="brand-btn" onclick="setCoverageBrand('bridgematch', this)">BridgeMatch</button>
      </div>
    </div>
    <div class="panel-body">
      <div id="coverage-body"><div class="empty"><span class="spinner"></span> Loading...</div></div>
    </div>
  </div>

  <!-- Panel B: Draft Queue -->
  <div class="panel">
    <div class="panel-header">
      <h2>Draft Queue</h2>
      <button class="btn btn-outline btn-sm" onclick="loadQueue()">↻ Refresh</button>
    </div>
    <div class="panel-body">
      <div id="queue-body"><div class="empty"><span class="spinner"></span> Loading...</div></div>
    </div>
  </div>

  <!-- Panel C: Editorial Input -->
  <div class="panel">
    <div class="panel-header"><h2>Add Content</h2></div>
    <div class="panel-body">
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('notes', this)">Notes</button>
        <button class="tab-btn" onclick="showTab('paste', this)">Paste Text</button>
        <button class="tab-btn" onclick="showTab('upload', this)">Upload</button>
      </div>

      <div id="tab-notes" class="tab-pane active">
        <div class="form-group">
          <label>Brand</label>
          <select id="brief-brand">
            <option value="">Both brands</option>
            <option value="auctionbrain">AuctionBrain</option>
            <option value="bridgematch">BridgeMatch</option>
          </select>
        </div>
        <div class="form-group">
          <label>Topic or angle (optional)</label>
          <input type="text" id="brief-topic" placeholder="e.g. auction finance, 28-day completions">
        </div>
        <div class="form-group">
          <label>Your notes</label>
          <textarea id="brief-message" placeholder="Write your thoughts, directions, or story ideas. This feeds the next generation run as editorial guidance."></textarea>
        </div>
        <button class="btn btn-navy" onclick="submitBrief()">Save Brief</button>
      </div>

      <div id="tab-paste" class="tab-pane">
        <div class="form-group">
          <label>Brand</label>
          <select id="seed-brand">
            <option value="">Both brands</option>
            <option value="auctionbrain">AuctionBrain</option>
            <option value="bridgematch">BridgeMatch</option>
          </select>
        </div>
        <div class="form-group">
          <label>Title (optional)</label>
          <input type="text" id="seed-title" placeholder="Source title or description">
        </div>
        <div class="form-group">
          <label>Paste article, quote, or notes</label>
          <textarea id="seed-content" style="min-height:160px" placeholder="Paste any text — article excerpts, stats, broker anecdotes, market commentary..."></textarea>
        </div>
        <button class="btn btn-navy" onclick="submitSeed()">Save as Source</button>
      </div>

      <div id="tab-upload" class="tab-pane">
        <div class="form-group">
          <label>Brand</label>
          <select id="upload-brand">
            <option value="">Both brands</option>
            <option value="auctionbrain">AuctionBrain</option>
            <option value="bridgematch">BridgeMatch</option>
          </select>
        </div>
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('upload-input').click()">
          <div style="font-size:2rem">📄</div>
          <p>Click to upload or drag a PDF / photo here</p>
          <p style="font-size:0.72rem;margin-top:0.25rem">PDF, JPG, PNG, WebP supported</p>
        </div>
        <input type="file" id="upload-input" accept=".pdf,image/*" onchange="handleFileSelect(this)">
        <div id="upload-status"></div>
        <div id="extracted-preview" class="extracted-preview"></div>
        <div id="upload-save-row" style="display:none">
          <div class="form-group">
            <label>Title for this content</label>
            <input type="text" id="upload-title" placeholder="e.g. Property Investor News — May 2026">
          </div>
          <button class="btn btn-navy" onclick="saveExtracted()">Save as Source</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Panel D: Brief Queue -->
  <div class="panel">
    <div class="panel-header">
      <h2>Brief Queue</h2>
      <button class="btn btn-outline btn-sm" onclick="loadBriefs()">↻ Refresh</button>
    </div>
    <div class="panel-body">
      <div id="briefs-body"><div class="empty"><span class="spinner"></span> Loading...</div></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
// All user-supplied HTML is passed through DOMPurify.sanitize() before
// being set via innerHTML. Static structural HTML uses innerHTML directly.

let coverageBrand = 'all';
let extractedText = '';
let extractedFilename = '';

// ── HELPERS ──

function safe(html) {
  return DOMPurify.sanitize(html, { ALLOWED_TAGS: ['b', 'span', 'i', 'br', 'code'], ALLOWED_ATTR: ['class', 'style', 'title'] });
}

function setHtml(el, html) {
  el.innerHTML = DOMPurify.sanitize(html);
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 3200);
}

async function api(method, path, body) {
  const opts = { method, credentials: 'include', headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

// ── TABS ──

function showTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── PANEL A: COVERAGE ──

function setCoverageBrand(brand, btn) {
  coverageBrand = brand;
  document.querySelectorAll('.brand-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadCoverage();
}

async function loadCoverage() {
  const el = document.getElementById('coverage-body');
  el.innerHTML = '<div class="empty"><span class="spinner"></span> Loading...</div>';
  try {
    const qs = coverageBrand !== 'all' ? `?brand=${encodeURIComponent(coverageBrand)}` : '';
    const { posts, coverage } = await api('GET', `/api/content/coverage${qs}`);

    if (!coverage.length) {
      el.innerHTML = '<div class="empty">No published posts yet.</div>';
      return;
    }

    // Build coverage grid using DOM APIs to avoid innerHTML with user data
    const grid = document.createElement('div');
    grid.className = 'coverage-grid';

    for (const { tag, count, status } of coverage) {
      const chip = document.createElement('span');
      chip.className = `tag-chip ${status}`;
      chip.title = `${count} post${count !== 1 ? 's' : ''}`;

      const tagText = document.createTextNode(tag + ' ');
      const countSpan = document.createElement('span');
      countSpan.className = 'count';
      countSpan.textContent = String(count);

      chip.appendChild(tagText);
      chip.appendChild(countSpan);
      grid.appendChild(chip);
    }

    const meta = document.createElement('p');
    meta.style.cssText = 'font-size:0.78rem;color:var(--muted);margin-bottom:0.75rem';
    meta.textContent = `${posts} published post${posts !== 1 ? 's' : ''} · covered (1–2)  saturated (3+)`;

    el.innerHTML = '';
    el.appendChild(meta);
    el.appendChild(grid);
  } catch (err) {
    const msg = document.createElement('div');
    msg.className = 'empty';
    msg.style.color = 'var(--red)';
    msg.textContent = `Error: ${err.message}`;
    el.innerHTML = '';
    el.appendChild(msg);
  }
}

// ── PANEL B: DRAFT QUEUE ──

async function loadQueue() {
  const el = document.getElementById('queue-body');
  el.innerHTML = '<div class="empty"><span class="spinner"></span> Loading...</div>';
  try {
    const { drafts } = await api('GET', '/api/content/queue');
    if (!drafts.length) {
      el.innerHTML = '<div class="empty">No drafts waiting for review.</div>';
      return;
    }
    const list = document.createElement('div');
    list.className = 'draft-list';
    drafts.forEach(d => list.appendChild(buildDraftCard(d)));
    el.innerHTML = '';
    el.appendChild(list);
  } catch (err) {
    const msg = document.createElement('div');
    msg.className = 'empty';
    msg.style.color = 'var(--red)';
    msg.textContent = `Error: ${err.message}`;
    el.innerHTML = '';
    el.appendChild(msg);
  }
}

function buildDraftCard(d) {
  const brand = d.brand || 'auctionbrain';
  const card = document.createElement('div');
  card.className = 'draft-card';
  card.id = `draft-${d.id}`;

  // Top row: title + brand chip
  const top = document.createElement('div');
  top.className = 'draft-card-top';

  const title = document.createElement('div');
  title.className = 'draft-card-title';
  title.textContent = d.title || '(untitled)';

  const chip = document.createElement('span');
  chip.className = `brand-chip ${brand}`;
  chip.textContent = brand === 'bridgematch' ? 'BridgeMatch' : 'AuctionBrain';

  top.appendChild(title);
  top.appendChild(chip);
  card.appendChild(top);

  // Meta
  const meta = document.createElement('div');
  meta.className = 'draft-meta';
  meta.textContent = fmtDate(d.created_at) + (d.post_type ? ` · ${d.post_type}` : '');
  card.appendChild(meta);

  // Summary
  const rawSummary = d.summary || (d.content || '').replace(/[#*`]/g, '').slice(0, 200);
  if (rawSummary) {
    const summary = document.createElement('div');
    summary.className = 'draft-summary';
    summary.textContent = rawSummary.slice(0, 200) + (rawSummary.length > 200 ? '…' : '');
    card.appendChild(summary);
  }

  // Actions
  const actions = document.createElement('div');
  actions.className = 'draft-actions';

  const approveBtn = document.createElement('button');
  approveBtn.className = 'btn btn-green btn-sm';
  approveBtn.textContent = '✓ Approve';
  approveBtn.onclick = () => approveDraft(brand, d.id, approveBtn);

  const rejectBtn = document.createElement('button');
  rejectBtn.className = 'btn btn-outline btn-sm';
  rejectBtn.textContent = '✗ Reject';
  rejectBtn.onclick = () => { rejectForm.style.display = rejectForm.style.display === 'block' ? 'none' : 'block'; };

  actions.appendChild(approveBtn);
  actions.appendChild(rejectBtn);

  if (d.evaluation_score != null) {
    const score = document.createElement('span');
    score.className = `draft-score${d.evaluation_score >= 8 ? ' pass' : ''}`;
    score.textContent = `${d.evaluation_score}/10`;
    actions.appendChild(score);
  }

  card.appendChild(actions);

  // Reject form
  const rejectForm = document.createElement('div');
  rejectForm.className = 'reject-form';
  rejectForm.id = `reject-form-${d.id}`;

  const rejectTextarea = document.createElement('textarea');
  rejectTextarea.placeholder = 'Feedback for the engine (optional)...';
  rejectTextarea.rows = 2;

  const rejectSubmit = document.createElement('button');
  rejectSubmit.className = 'btn btn-red btn-sm';
  rejectSubmit.textContent = 'Send rejection';
  rejectSubmit.onclick = () => rejectDraft(brand, d.id, rejectSubmit, rejectTextarea);

  rejectForm.appendChild(rejectTextarea);
  rejectForm.appendChild(rejectSubmit);
  card.appendChild(rejectForm);

  return card;
}

async function approveDraft(brand, id, btn) {
  btn.disabled = true;
  btn.textContent = '…';
  try {
    await api('POST', `/api/content/approve/${encodeURIComponent(brand)}/${encodeURIComponent(id)}`);
    document.getElementById(`draft-${id}`)?.remove();
    toast('Draft approved ✓');
  } catch (err) {
    btn.disabled = false;
    btn.textContent = '✓ Approve';
    toast(err.message, true);
  }
}

async function rejectDraft(brand, id, btn, textarea) {
  const feedback = textarea.value.trim();
  btn.disabled = true;
  try {
    await api('POST', `/api/content/reject/${encodeURIComponent(brand)}/${encodeURIComponent(id)}`, { feedback });
    document.getElementById(`draft-${id}`)?.remove();
    toast('Draft rejected');
  } catch (err) {
    btn.disabled = false;
    toast(err.message, true);
  }
}

// ── PANEL C: EDITORIAL INPUT ──

async function submitBrief() {
  const message = document.getElementById('brief-message').value.trim();
  const brand = document.getElementById('brief-brand').value;
  const topic = document.getElementById('brief-topic').value.trim();
  if (!message) { toast('Write some notes first', true); return; }
  try {
    await api('POST', '/api/content/brief', { message, brand: brand || null, topic: topic || null });
    document.getElementById('brief-message').value = '';
    document.getElementById('brief-topic').value = '';
    toast('Brief saved ✓');
    loadBriefs();
  } catch (err) {
    toast(err.message, true);
  }
}

async function submitSeed() {
  const content = document.getElementById('seed-content').value.trim();
  const brand = document.getElementById('seed-brand').value;
  const title = document.getElementById('seed-title').value.trim();
  if (!content) { toast('Paste some content first', true); return; }
  try {
    await api('POST', '/api/content/seed', { content, brand: brand || null, title: title || null });
    document.getElementById('seed-content').value = '';
    document.getElementById('seed-title').value = '';
    toast('Saved as source ✓');
  } catch (err) {
    toast(err.message, true);
  }
}

// ── FILE UPLOAD ──

document.addEventListener('DOMContentLoaded', () => {
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragging'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragging'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragging'); const f = e.dataTransfer.files[0]; if (f) processFile(f); });
});

function handleFileSelect(input) {
  const file = input.files[0];
  if (file) processFile(file);
}

async function processFile(file) {
  const statusEl = document.getElementById('upload-status');
  const previewEl = document.getElementById('extracted-preview');
  const saveRow = document.getElementById('upload-save-row');

  statusEl.innerHTML = '<p style="font-size:0.82rem;color:var(--muted)"><span class="spinner"></span> Extracting content via Claude…</p>';
  previewEl.style.display = 'none';
  saveRow.style.display = 'none';
  extractedText = '';
  extractedFilename = file.name;

  try {
    const base64 = await fileToBase64(file);
    const { extracted } = await api('POST', '/api/content/upload', { mimeType: file.type, data: base64, filename: file.name });

    extractedText = extracted;

    // Show status using textContent (no HTML injection)
    const statusP = document.createElement('p');
    statusP.style.cssText = 'font-size:0.82rem;color:var(--green);margin-bottom:0.5rem';
    statusP.textContent = `✓ Extracted from ${file.name}`;
    statusEl.innerHTML = '';
    statusEl.appendChild(statusP);

    // Show preview using textContent (raw markdown, not rendered)
    previewEl.textContent = extracted;
    previewEl.style.display = 'block';

    document.getElementById('upload-title').value = file.name.replace(/\.[^.]+$/, '');
    saveRow.style.display = 'block';
  } catch (err) {
    const errP = document.createElement('p');
    errP.style.cssText = 'font-size:0.82rem;color:var(--red)';
    errP.textContent = `Error: ${err.message}`;
    statusEl.innerHTML = '';
    statusEl.appendChild(errP);
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function saveExtracted() {
  if (!extractedText) { toast('No content to save', true); return; }
  const title = document.getElementById('upload-title').value.trim() || extractedFilename;
  const brand = document.getElementById('upload-brand').value;
  try {
    await api('POST', '/api/content/seed', { content: extractedText, title, brand: brand || null });
    toast('Saved as source ✓');
    document.getElementById('upload-save-row').style.display = 'none';
    document.getElementById('extracted-preview').style.display = 'none';
    document.getElementById('upload-status').innerHTML = '';
    extractedText = '';
    document.getElementById('upload-input').value = '';
  } catch (err) {
    toast(err.message, true);
  }
}

// ── PANEL D: BRIEF QUEUE ──

async function loadBriefs() {
  const el = document.getElementById('briefs-body');
  el.innerHTML = '<div class="empty"><span class="spinner"></span> Loading...</div>';
  try {
    const { briefs } = await api('GET', '/api/content/briefs');
    if (!briefs.length) {
      el.innerHTML = '<div class="empty">No briefs queued — add some in the Notes tab.</div>';
      return;
    }
    const list = document.createElement('div');
    list.className = 'brief-list';
    briefs.forEach(b => list.appendChild(buildBriefCard(b)));
    el.innerHTML = '';
    el.appendChild(list);
  } catch (err) {
    const msg = document.createElement('div');
    msg.className = 'empty';
    msg.style.color = 'var(--red)';
    msg.textContent = `Error: ${err.message}`;
    el.innerHTML = '';
    el.appendChild(msg);
  }
}

function buildBriefCard(b) {
  const card = document.createElement('div');
  card.className = 'brief-card';
  card.id = `brief-${b.id}`;

  const body = document.createElement('div');
  body.className = 'brief-card-body';

  if (b.topic) {
    const topicEl = document.createElement('div');
    topicEl.style.cssText = 'font-size:0.72rem;font-weight:600;color:var(--navy);margin-bottom:0.2rem';
    topicEl.textContent = b.topic;
    body.appendChild(topicEl);
  }

  const msgEl = document.createElement('div');
  msgEl.textContent = b.message;
  body.appendChild(msgEl);

  const meta = document.createElement('div');
  meta.className = 'brief-card-meta';
  meta.textContent = fmtDate(b.created_at) + (b.brand ? ` · ${b.brand}` : '');
  body.appendChild(meta);

  const dismissBtn = document.createElement('button');
  dismissBtn.className = 'btn btn-outline btn-sm';
  dismissBtn.title = 'Dismiss';
  dismissBtn.textContent = '✕';
  dismissBtn.onclick = () => dismissBrief(b.id, dismissBtn);

  card.appendChild(body);
  card.appendChild(dismissBtn);
  return card;
}

async function dismissBrief(id, btn) {
  btn.disabled = true;
  try {
    await api('POST', `/api/content/brief/${encodeURIComponent(id)}/dismiss`);
    document.getElementById(`brief-${id}`)?.remove();
  } catch (err) {
    btn.disabled = false;
    toast(err.message, true);
  }
}

// ── INIT ──

async function init() {
  document.getElementById('last-updated').textContent = 'Loading…';
  await Promise.all([loadCoverage(), loadQueue(), loadBriefs()]);
  document.getElementById('last-updated').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

init();
</script>
