<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@700&family=DM+Sans:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    background: {{NAVY}};
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: {{BODY_FONT}};
    overflow: hidden;
    position: relative;
  }

  .headline {
    font-family: {{HEADING_FONT}};
    font-size: 72px;
    font-weight: 700;
    color: {{CREAM}};
    text-align: center;
    line-height: 1.15;
    padding: 0 80px;
  }

  .subline {
    font-size: 36px;
    color: {{GREEN}};
    text-align: center;
    margin-top: 40px;
    padding: 0 100px;
    line-height: 1.4;
  }

  .logo {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    height: 80px;
  }
</style>
</head>
<body>
  <div class="headline">{{HEADLINE}}</div>
  <div class="subline">{{BODY}}</div>
  <img class="logo" src="{{LOGO_URL}}" alt="logo">
</body>
</html>
