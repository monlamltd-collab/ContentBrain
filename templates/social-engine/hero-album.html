<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: {{WIDTH}}px;
    height: {{HEIGHT}}px;
    background: {{CREAM}};
    font-family: {{BODY_FONT}};
    overflow: hidden;
    position: relative;
  }

  .logo {
    position: absolute;
    top: 36px;
    left: 36px;
    height: 60px;
    z-index: 5;
  }

  .hero {
    position: absolute;
    top: 120px;
    left: 36px;
    right: 36px;
    height: 528px;
    background-color: #e6e2dc;
    background-size: cover;
    background-position: center;
    background-image: url('{{FRAME_LOT_IMAGE}}');
  }

  .frame-dots {
    position: absolute;
    bottom: 110px;
    right: 36px;
    color: {{NAVY}};
    opacity: 0.6;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .content {
    position: absolute;
    left: 36px;
    right: 36px;
    top: 670px;
    bottom: 96px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .headline {
    font-family: {{HEADING_FONT}};
    font-size: {{HEADLINE_SIZE}}px;
    font-weight: 700;
    color: {{NAVY}};
    line-height: 1.1;
    margin-bottom: 16px;
  }

  .body-text {
    font-size: 22px;
    color: {{NAVY}};
    opacity: 0.78;
    line-height: 1.45;
  }

  .footer-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: {{GREEN}};
    padding: 22px 36px;
    color: #ffffff;
    font-family: {{BODY_FONT}};
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .brand-mark {
    position: absolute;
    bottom: 92px;
    left: 36px;
    color: {{NAVY}};
    opacity: 0.55;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <img class="logo" src="{{LOGO_URL}}" alt="logo">
  <div class="hero"></div>
  <div class="frame-dots">{{FRAME_INDEX}} / {{FRAME_TOTAL}}</div>
  <div class="content">
    <div class="headline">{{HEADLINE}}</div>
    <div class="body-text">{{BODY}}</div>
  </div>
  <div class="brand-mark">Unloved Britain</div>
  <div class="footer-bar">{{FOLLOW_OR_CTA}}</div>
</body>
</html>
