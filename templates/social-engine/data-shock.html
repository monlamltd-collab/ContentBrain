<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: {{WIDTH}}px;
    height: {{HEIGHT}}px;
    background: {{CREAM}};
    font-family: {{BODY_FONT}};
    overflow: hidden;
    position: relative;
  }

  .logo {
    position: absolute;
    top: 36px;
    left: 36px;
    height: 60px;
  }

  .content {
    position: absolute;
    inset: 100px 64px 130px 64px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .micro-stat {
    font-family: {{HEADING_FONT}};
    font-size: {{MICRO_STAT_SIZE}}px;
    font-weight: 700;
    color: {{NAVY}};
    line-height: 1;
    margin-bottom: 32px;
  }

  .micro-caption {
    font-size: 28px;
    color: {{NAVY}};
    opacity: 0.82;
    line-height: 1.35;
    max-width: 80%;
  }

  .footer-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: {{NAVY}};
    padding: 22px 36px;
    color: {{CREAM}};
    font-family: {{BODY_FONT}};
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .brand-mark {
    position: absolute;
    bottom: 92px;
    right: 36px;
    color: {{NAVY}};
    opacity: 0.55;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <img class="logo" src="{{LOGO_URL}}" alt="logo">
  <div class="content">
    <div class="micro-stat">{{MICRO_STAT}}</div>
    <div class="micro-caption">{{MICRO_CAPTION}}</div>
  </div>
  <div class="brand-mark">Unloved Britain</div>
  <div class="footer-bar">{{FOLLOW_OR_CTA}}</div>
</body>
</html>
