<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: {{WIDTH}}px;
    height: {{HEIGHT}}px;
    background: {{CREAM}};
    font-family: {{BODY_FONT}};
    overflow: hidden;
    position: relative;
  }

  .logo {
    position: absolute;
    top: 36px;
    left: 36px;
    height: 60px;
    z-index: 5;
  }

  .niche-chip {
    position: absolute;
    top: 36px;
    right: 36px;
    background: {{NAVY}};
    color: {{CREAM}};
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    border-radius: 4px;
    z-index: 5;
  }

  .lot-image {
    position: absolute;
    top: 120px;
    left: 36px;
    right: 36px;
    height: 432px;
    background-color: #e6e2dc;
    background-size: cover;
    background-position: center;
    background-image: url('{{FRAME_LOT_IMAGE}}');
  }

  .lot-snapshot {
    position: absolute;
    left: 36px;
    right: 36px;
    top: 580px;
    bottom: 92px;
    padding: 24px 32px;
    background: rgba(26, 43, 75, 0.04);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .address-line {
    font-family: {{HEADING_FONT}};
    font-size: 36px;
    font-weight: 700;
    color: {{NAVY}};
    line-height: 1.15;
    margin-bottom: 14px;
  }

  .price-text {
    font-size: 28px;
    color: {{NAVY}};
    font-weight: 500;
    margin-bottom: 10px;
  }

  .key-fact {
    font-size: 22px;
    color: {{GREEN}};
    font-weight: 500;
  }

  .frame-dots {
    position: absolute;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    color: {{NAVY}};
    opacity: 0.65;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.05em;
    z-index: 5;
  }

  .footer-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: {{GREEN}};
    padding: 22px 36px;
    color: #ffffff;
    font-family: {{BODY_FONT}};
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <img class="logo" src="{{LOGO_URL}}" alt="logo">
  <div class="niche-chip">{{NICHE_TAG_LABEL}}</div>
  <div class="frame-dots">{{FRAME_INDEX}} / {{FRAME_TOTAL}}</div>
  <div class="lot-image"></div>
  <div class="lot-snapshot">
    <div class="address-line">{{FRAME_ADDRESS}}</div>
    <div class="price-text">{{FRAME_PRICE}}</div>
    <div class="key-fact">{{FRAME_KEY_FACT}}</div>
  </div>
  <div class="footer-bar">{{FOLLOW_OR_CTA}}</div>
</body>
</html>
